ubuntu_release: "noble"

common_packages:
  - nginx
  - fail2ban
  - bash-completion
  - apt-utils
  - net-tools
  - iputils-ping
  - dnsutils
  - httpie
  - curl
  - htop
  - jq
  - tree
  - vim
  - git
  - openssl
  - ufw
  - certbot
  - python3-certbot-nginx
  - bmon
  - iftop
  - vnstat
  - nload
  - iotop
  - sysstat
  - logrotate
  - unattended-upgrades
  - fail2ban

ntp_allowed_networks:
  - "0.0.0.0/0"
ssh_allowed_networks:
  - "192.168.122.0/24"
web_exposed_vm_roles:
  - dev
  - prod
  - monitoring
  - nominatim
  - versatiles
ufw_logging: "low"

uranus_domains:
  dev_frontend: "dev.uranus.home.arpa"
  dev_backend: "api.dev.uranus.home.arpa"
  prod_frontend: "uranus.home.arpa"
  prod_backend: "api.uranus.home.arpa"
  nominatim: "nominatim.uranus.home.arpa"
  icinga: "monitoring.uranus.home.arpa"
  versatiles: "tiles.uranus.home.arpa"
  mail_mx: "mail.uranus.home.arpa"

postgresql_version: 17
postgis_package: "postgresql-17-postgis-3"

ssl_email: "noreply@oklabflensburg.de"

backend_port: 9090
frontend_port: 3000
frontend_repo_url: "https://github.com/sndcds/uranus-dashboard.git"
frontend_nodejs_major: "20"
backend_repo_url: "https://github.com/sndcds/uranus.git"
backend_go_version: "1.25.8"
backend_go_archive_sha256: "ceb5e041bbc3893846bd1614d76cb4681c91dadee579426cf21a63f2d7e03be6"
backend_db_schema: "uranus"
backend_supported_languages:
  - de
  - en
  - da
backend_profile_image_quality: 75
backend_pluto_image_max_file_size: 20
backend_pluto_image_max_px: 1920
backend_auth_token_expiration_time: 600
backend_auth_smtp_host: ""
backend_auth_smtp_port: 587
backend_auth_smtp_login: ""
backend_auth_smtp_password: "{{ vault_backend_smtp_password | default('') }}"
backend_auth_reply_email_address: "{{ ssl_email }}"
backend_smtp_host: "{{ backend_auth_smtp_host }}"
backend_smtp_port: "{{ backend_auth_smtp_port }}"
backend_smtp_login: "{{ backend_auth_smtp_login }}"
backend_smtp_password: "{{ vault_backend_smtp_password | default('') }}"
postfix_relay_host: "{{ backend_smtp_host }}"
postfix_relay_port: "{{ backend_smtp_port }}"
postfix_relay_login: "{{ backend_smtp_login }}"
postfix_relay_password: "{{ backend_smtp_password }}"
backend_jwt_secret: "{{ vault_backend_jwt_secret }}"
backend_secret_key: "{{ vault_backend_secret_key }}"

nominatim_region_name: "Schleswig-Holstein"
nominatim_data_url: "https://download.geofabrik.de/europe/germany/schleswig-holstein-latest.osm.pbf"
nominatim_data_file: "/srv/nominatim/data/schleswig-holstein-latest.osm.pbf"
nominatim_project_dir: "/srv/nominatim/nominatim-project"
nominatim_import_style: "address"
nominatim_default_language: "de"
nominatim_languages:
  - de
  - en
  - da
nominatim_port: 8088
nominatim_db_delegate_host: "db01"
nominatim_db_name: "nominatim"
nominatim_db_user: "nominatim"
nominatim_db_password: "{{ vault_nominatim_db_password }}"
nominatim_db_allowed_networks:
  - "192.168.122.0/24"

versatiles_port: 8080
versatiles_system_user: "versatiles"
versatiles_data_dir: "/srv/versatiles"
versatiles_frontend_url: "https://github.com/versatiles-org/versatiles-frontend/releases/latest/download/frontend.br.tar.gz"
versatiles_tiles_url: "https://download.versatiles.org/osm.versatiles"
versatiles_tileset_name: "schleswig-holstein.versatiles"
versatiles_bbox: "8.35,53.25,11.40,55.10"
versatiles_bbox_border: 3

monitoring_db_delegate_host: "db01"
monitoring_web_db_name: "icingaweb2"
monitoring_web_db_user: "icingaweb2"
monitoring_web_db_password: "{{ vault_monitoring_web_db_password }}"
monitoring_ido_db_name: "icinga_ido"
monitoring_ido_db_user: "icinga_ido"
monitoring_ido_db_password: "{{ vault_monitoring_ido_db_password }}"
monitoring_admin_user: "icingaadmin"
monitoring_admin_password: "{{ vault_monitoring_admin_password }}"
monitoring_api_user: "icingaweb2"
monitoring_api_password: "{{ vault_monitoring_api_password }}"
monitoring_influx_enabled: true
monitoring_influx_bind_address: ":8086"
monitoring_influx_database: "uranus_metrics"
monitoring_influx_retention_name: "thirty_days"
monitoring_influx_retention_duration: "30d"
monitoring_influx_allowed_networks:
  - "192.168.122.0/24"
pluto_metrics_enabled: true
pluto_metrics_measurement: "pluto_image_files"
pluto_metrics_directory: "/opt/uranus/backend/pluto/images"
pluto_metrics_push_schedule: "hourly"
pluto_metrics_influx_host: "{{ hostvars.get('mon01', {}).ansible_host | default('mon01', true) }}"
monitoring_grafana_enabled: true
monitoring_grafana_repo_url: "https://apt.grafana.com"
monitoring_grafana_apt_key_url: "https://apt.grafana.com/gpg-full.key"
monitoring_grafana_domain: "{{ uranus_domains.icinga }}"
monitoring_grafana_admin_user: "admin"
monitoring_grafana_admin_password: "{{ vault_monitoring_grafana_admin_password }}"
monitoring_grafana_datasource_name: "uranus-influxdb"
monitoring_grafana_datasource_uid: "uranus-influxdb"
monitoring_grafana_dashboard_provider_name: "uranus"
monitoring_grafana_dashboard_path: "/var/lib/grafana/dashboards"
monitoring_bandwidth_enabled: true
monitoring_bandwidth_ssh_user: "monitoring-check"
monitoring_bandwidth_warning: "12500000"
monitoring_bandwidth_critical: "25000000"
monitoring_bandwidth_sample_seconds: 15
monitoring_bandwidth_ssh_identity_path: "/var/lib/icinga2/.ssh/monitoring-bandwidth-ed25519"
monitoring_bandwidth_interface_fallback: "enp1s0|ens3"
monitoring_cpu_warning: "85%"
monitoring_cpu_critical: "95%"
monitoring_memory_warning: "20%:"
monitoring_memory_critical: "10%:"
monitoring_load_warning: "4,3,2"
monitoring_load_critical: "6,5,4"

api_health_endpoint: "/api/events"
frontend_health_endpoint: "/"

backup_root: "/var/backups/uranus"
backup_retention_days: 14
app_backup_paths:
  - /etc/nginx
  - /etc/uranus
  - /opt/uranus/frontend/dist
  - /opt/uranus/backend/bin
  - /opt/uranus/backend/profile_images
  - /opt/uranus/backend/pluto/images
  - /opt/uranus/backend/pluto/cache
logrotate_retention: 14
