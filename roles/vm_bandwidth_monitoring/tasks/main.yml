---
- name: Ensure controller-side SSH key directory exists for bandwidth checks
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../.ansible"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

- name: Generate controller-side SSH key for bandwidth checks
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -t ed25519
      -f {{ playbook_dir }}/../.ansible/monitoring-bandwidth-ed25519
      -N ''
      -C monitoring-bandwidth
  args:
    creates: "{{ playbook_dir }}/../.ansible/monitoring-bandwidth-ed25519"
  delegate_to: localhost
  become: false
  run_once: true

- name: Install bandwidth monitoring plugin package
  ansible.builtin.apt:
    name:
      - monitoring-plugins
      - monitoring-plugins-contrib
    state: present

- name: Ensure bandwidth monitoring SSH user exists
  ansible.builtin.user:
    name: "{{ monitoring_bandwidth_ssh_user }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Authorize monitoring SSH key for bandwidth checks
  ansible.posix.authorized_key:
    user: "{{ monitoring_bandwidth_ssh_user }}"
    state: present
    key: "{{ lookup('file', playbook_dir ~ '/../.ansible/monitoring-bandwidth-ed25519.pub') }}"
