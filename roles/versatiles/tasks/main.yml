---
- name: Install VersaTiles dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Ensure VersaTiles system user exists
  ansible.builtin.user:
    name: "{{ versatiles_system_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ versatiles_data_dir }}"
    create_home: true

- name: Ensure VersaTiles directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(versatiles_system_user) }}"
    group: "{{ item.group | default(versatiles_system_user) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - path: "{{ versatiles_data_dir }}"
    - path: "{{ versatiles_data_dir }}/frontend"
    - path: "{{ versatiles_data_dir }}/tiles"
    - path: /var/log/versatiles

- name: Download VersaTiles install script
  ansible.builtin.get_url:
    url: https://github.com/versatiles-org/versatiles-rs/releases/latest/download/install-unix.sh
    dest: /tmp/versatiles-install-unix.sh
    mode: "0755"

- name: Install VersaTiles binary
  ansible.builtin.command:
    cmd: /tmp/versatiles-install-unix.sh
    creates: /usr/local/bin/versatiles

- name: Download VersaTiles frontend bundle
  ansible.builtin.get_url:
    url: "{{ versatiles_frontend_url }}"
    dest: "{{ versatiles_data_dir }}/frontend/frontend.br.tar.gz"
    owner: "{{ versatiles_system_user }}"
    group: "{{ versatiles_system_user }}"
    mode: "0644"

- name: Download Schleswig-Holstein VersaTiles subset
  ansible.builtin.command:
    cmd: >-
      /usr/local/bin/versatiles convert
      --bbox-border {{ versatiles_bbox_border }}
      --bbox {{ versatiles_bbox }}
      {{ versatiles_tiles_url }}
      {{ versatiles_data_dir }}/tiles/{{ versatiles_tileset_name }}
    creates: "{{ versatiles_data_dir }}/tiles/{{ versatiles_tileset_name }}"
  become_user: "{{ versatiles_system_user }}"

- name: Deploy VersaTiles systemd service
  ansible.builtin.template:
    src: versatiles.service.j2
    dest: /etc/systemd/system/versatiles.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart versatiles

- name: Enable and start VersaTiles service
  ansible.builtin.systemd:
    name: versatiles
    enabled: true
    state: started
    daemon_reload: true
