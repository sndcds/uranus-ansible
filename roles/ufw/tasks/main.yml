---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable UFW logging
  community.general.ufw:
    logging: "{{ ufw_logging | default('low') }}"

- name: Allow SSH from configured management networks
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ ssh_allowed_networks | default(['192.168.122.0/24']) }}"

- name: Rate-limit SSH
  community.general.ufw:
    rule: limit
    port: "22"
    proto: tcp
  when: ssh_allowed_networks | default([]) | length == 0

- name: Allow HTTP on web-facing VMs
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: vm_role in (web_exposed_vm_roles | default([]))

- name: Allow HTTPS on web-facing VMs
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: vm_role in (web_exposed_vm_roles | default([]))

- name: Allow backend API port locally if app server
  community.general.ufw:
    rule: allow
    port: "{{ backend_port }}"
    proto: tcp
    src: 127.0.0.1
  when: vm_role in ['dev', 'prod']

- name: Allow PostgreSQL from configured internal networks on database host
  community.general.ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ postgresql_allowed_networks | default([]) }}"
  when:
    - vm_role == 'db'
    - item != '0.0.0.0/0'

- name: Enable UFW
  community.general.ufw:
    state: enabled
