---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow NTP
  community.general.ufw:
    rule: allow
    port: "123"
    proto: udp

- name: Allow backend API port locally if app server
  community.general.ufw:
    rule: allow
    port: "{{ backend_port }}"
    proto: tcp
    src: 127.0.0.1
  when: vm_role in ['dev', 'prod']

- name: Allow PostgreSQL from configured internal networks on database host
  community.general.ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ postgresql_allowed_networks | default([]) }}"
  when:
    - vm_role == 'db'
    - item != '0.0.0.0/0'

- name: Enable UFW
  community.general.ufw:
    state: enabled
