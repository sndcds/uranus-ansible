---
- name: Install monitoring packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - icinga2
      - icinga2-ido-pgsql
      - influxdb
      - icingaweb2
      - icingaweb2-module-monitoring
      - icingacli
      - monitoring-plugins
      - openssh-client
      - postgresql-client
      - php-fpm
      - php-pgsql
      - php-gd
      - php-intl
      - php-mbstring
      - php-xml
      - php-curl
      - gnupg
      - wget
    state: present

- name: Ensure APT keyrings directory exists for Grafana
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: monitoring_grafana_enabled | bool

- name: Install Grafana repository signing key
  ansible.builtin.get_url:
    url: "{{ monitoring_grafana_apt_key_url }}"
    dest: /etc/apt/keyrings/grafana.asc
    owner: root
    group: root
    mode: "0644"
  when: monitoring_grafana_enabled | bool

- name: Configure Grafana APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] {{ monitoring_grafana_repo_url }} stable main"
    filename: grafana
    state: present
    update_cache: true
  when: monitoring_grafana_enabled | bool

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true
  when: monitoring_grafana_enabled | bool

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Ensure Icinga SSH directory exists for bandwidth checks
  ansible.builtin.file:
    path: /var/lib/icinga2/.ssh
    state: directory
    owner: nagios
    group: nagios
    mode: "0700"
  when: monitoring_bandwidth_enabled | bool

- name: Deploy bandwidth monitoring private SSH key
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../.ansible/monitoring-bandwidth-ed25519"
    dest: "{{ monitoring_bandwidth_ssh_identity_path }}"
    owner: nagios
    group: nagios
    mode: "0600"
  when: monitoring_bandwidth_enabled | bool

- name: Deploy bandwidth monitoring public SSH key
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../.ansible/monitoring-bandwidth-ed25519.pub"
    dest: "{{ monitoring_bandwidth_ssh_identity_path }}.pub"
    owner: nagios
    group: nagios
    mode: "0644"
  when: monitoring_bandwidth_enabled | bool

- name: Wait for delegated database host SSH on db01
  ansible.builtin.wait_for_connection:
    timeout: 60
    connect_timeout: 5
    sleep: 2
  delegate_to: "{{ monitoring_db_delegate_host }}"

- name: Disable apache2 to serve Icinga Web 2 only via nginx
  ansible.builtin.systemd:
    name: apache2
    enabled: false
    state: stopped
    masked: true
  when: "'apache2.service' in ansible_facts.services"

- name: Enable icinga2 without starting it before configuration is complete
  ansible.builtin.systemd:
    name: icinga2
    enabled: true
    state: stopped

- name: Enable php-fpm
  ansible.builtin.systemd:
    name: php8.3-fpm
    enabled: true
    state: started

- name: Ensure Grafana dashboard directory exists
  ansible.builtin.file:
    path: "{{ monitoring_grafana_dashboard_path }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  when: monitoring_grafana_enabled | bool

- name: Ensure InfluxDB data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: influxdb
    group: influxdb
    mode: "0755"
  loop:
    - /var/lib/influxdb
    - /var/lib/influxdb/data
    - /var/lib/influxdb/meta
    - /var/lib/influxdb/wal
  when: monitoring_influx_enabled | bool

- name: Configure InfluxDB HTTP bind address
  ansible.builtin.lineinfile:
    path: /etc/influxdb/influxdb.conf
    regexp: '^\s*bind-address\s*='
    line: 'bind-address = "{{ monitoring_influx_bind_address }}"'
    insertafter: '^\[http\]'
  when: monitoring_influx_enabled | bool
  notify: Restart influxdb

- name: Ensure InfluxDB auth remains disabled on trusted lab network
  ansible.builtin.lineinfile:
    path: /etc/influxdb/influxdb.conf
    regexp: '^\s*auth-enabled\s*='
    line: 'auth-enabled = false'
    insertafter: '^\[http\]'
  when: monitoring_influx_enabled | bool
  notify: Restart influxdb

- name: Enable and start InfluxDB
  ansible.builtin.systemd:
    name: influxdb
    enabled: true
    state: started
    daemon_reload: true
  when: monitoring_influx_enabled | bool

- name: Deploy Grafana server configuration
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: "0640"
  when: monitoring_grafana_enabled | bool
  notify: Restart grafana

- name: Deploy Grafana InfluxDB datasource
  ansible.builtin.template:
    src: grafana-datasource-influxdb.yml.j2
    dest: /etc/grafana/provisioning/datasources/uranus-influxdb.yml
    owner: root
    group: grafana
    mode: "0640"
  when:
    - monitoring_grafana_enabled | bool
    - monitoring_influx_enabled | bool
  notify: Restart grafana

- name: Deploy Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/uranus.yml
    owner: root
    group: grafana
    mode: "0640"
  when: monitoring_grafana_enabled | bool
  notify: Restart grafana

- name: Deploy Grafana Pluto dashboard
  ansible.builtin.template:
    src: grafana-dashboard-pluto-images.json.j2
    dest: "{{ monitoring_grafana_dashboard_path }}/pluto-images.json"
    owner: grafana
    group: grafana
    mode: "0644"
  when: monitoring_grafana_enabled | bool
  notify: Restart grafana

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana-server
    enabled: true
    state: started
    daemon_reload: true
  when: monitoring_grafana_enabled | bool

- name: Ensure icingaweb2 configuration directory exists
  ansible.builtin.file:
    path: /etc/icingaweb2
    state: directory
    owner: root
    group: www-data
    mode: "0770"

- name: Ensure icingaweb2 subdirectories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: www-data
    mode: "0770"
  loop:
    - /etc/icingaweb2/enabledModules
    - /etc/icingaweb2/modules
    - /etc/icingaweb2/modules/monitoring

- name: Allow www-data to access icingaweb2 configuration
  ansible.builtin.user:
    name: www-data
    groups: icingaweb2
    append: true

- name: Find Icinga Web 2 PostgreSQL schema file
  ansible.builtin.shell: >
    for path in
    /usr/share/icingaweb2/etc/schema/pgsql.schema.sql
    /usr/share/icingaweb2/schema/pgsql.schema.sql
    /usr/share/icingaweb2/etc/schema/pgsql.sql;
    do
      [ -f "$path" ] && echo "$path" && exit 0;
    done;
    exit 1
  args:
    executable: /bin/bash
  register: icingaweb_schema_file
  changed_when: false

- name: Ensure monitoring database users exist on db01
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    encrypted: true
  become_user: postgres
  delegate_to: "{{ monitoring_db_delegate_host }}"
  loop:
    - name: "{{ monitoring_web_db_user }}"
      password: "{{ monitoring_web_db_password }}"
    - name: "{{ monitoring_ido_db_user }}"
      password: "{{ monitoring_ido_db_password }}"

- name: Ensure monitoring databases exist on db01
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner }}"
  become_user: postgres
  delegate_to: "{{ monitoring_db_delegate_host }}"
  loop:
    - name: "{{ monitoring_web_db_name }}"
      owner: "{{ monitoring_web_db_user }}"
    - name: "{{ monitoring_ido_db_name }}"
      owner: "{{ monitoring_ido_db_user }}"

- name: Build Uranus VM monitoring target list
  ansible.builtin.set_fact:
    monitoring_targets:
      - name: "db01"
        address: "{{ hostvars.get('db01', {}).ansible_host | default('', true) }}"
        os: "Linux"
        ssh_checks:
          bandwidth:
            by_ssh_address: "{{ hostvars.get('db01', {}).ansible_host | default('', true) }}"
            by_ssh_logname: "{{ monitoring_bandwidth_ssh_user }}"
            by_ssh_identity: "{{ monitoring_bandwidth_ssh_identity_path }}"
            by_ssh_quiet: true
            by_ssh_timeout: 20
            by_ssh_options: &monitoring_ssh_options
              - "BatchMode=yes"
              - "StrictHostKeyChecking=no"
              - "UserKnownHostsFile=/dev/null"
            by_ssh_command: >-
              /usr/lib/nagios/plugins/check_network --check-link
              --ifname '{{ hostvars.get('db01', {}).monitoring_bandwidth_interface_fact | default(monitoring_bandwidth_interface_fallback, true) }}'
              -w {{ monitoring_bandwidth_warning }}
              -c {{ monitoring_bandwidth_critical }}
              {{ monitoring_bandwidth_sample_seconds }}
          remote-cpu:
            by_ssh_address: "{{ hostvars.get('db01', {}).ansible_host | default('', true) }}"
            by_ssh_logname: "{{ monitoring_bandwidth_ssh_user }}"
            by_ssh_identity: "{{ monitoring_bandwidth_ssh_identity_path }}"
            by_ssh_quiet: true
            by_ssh_timeout: 20
            by_ssh_options: *monitoring_ssh_options
            by_ssh_command: >-
              /usr/lib/nagios/plugins/check_cpu
              -w {{ monitoring_cpu_warning }}
              -c {{ monitoring_cpu_critical }}
              1 2
          remote-load:
            by_ssh_address: "{{ hostvars.get('db01', {}).ansible_host | default('', true) }}"
            by_ssh_logname: "{{ monitoring_bandwidth_ssh_user }}"
            by_ssh_identity: "{{ monitoring_bandwidth_ssh_identity_path }}"
            by_ssh_quiet: true
            by_ssh_timeout: 20
            by_ssh_options: *monitoring_ssh_options
            by_ssh_command: >-
              /usr/lib/nagios/plugins/check_load
              --percpu
              -w {{ monitoring_load_warning }}
              -c {{ monitoring_load_critical }}
          remote-memory:
            by_ssh_address: "{{ hostvars.get('db01', {}).ansible_host | default('', true) }}"
            by_ssh_logname: "{{ monitoring_bandwidth_ssh_user }}"
            by_ssh_identity: "{{ monitoring_bandwidth_ssh_identity_path }}"
            by_ssh_quiet: true
            by_ssh_timeout: 20
            by_ssh_options: *monitoring_ssh_options
            by_ssh_command: >-
              /usr/lib/nagios/plugins/check_memory
              --available
              -w {{ monitoring_memory_warning }}
              -c {{ monitoring_memory_critical }}
        tcp_checks:
          postgresql:
            tcp_port: 5432
        pgsql_checks:
          postgresql-db:
            pgsql_hostname: "{{ hostvars.get('db01', {}).ansible_host | default('', true) }}"
            pgsql_port: 5432
            pgsql_database: "{{ monitoring_web_db_name }}"
            pgsql_username: "{{ monitoring_web_db_user }}"
            pgsql_password: "{{ monitoring_web_db_password }}"
