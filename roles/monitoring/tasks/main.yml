            by_ssh_command: >-
              /usr/lib/nagios/plugins/check_memory
              --available
              -w {{ monitoring_memory_warning }}
              -c {{ monitoring_memory_critical }}
        http_checks:
          nginx:
            http_ssl: true
            http_sni: true
            http_vhost: "{{ uranus_domains.dev_frontend }}"
            http_uri: "/"
          frontend:
            http_ssl: true
            http_sni: true
            http_vhost: "{{ uranus_domains.dev_frontend }}"
            http_uri: "{{ frontend_health_endpoint }}"
          backend:
            http_ssl: true
            http_sni: true
            http_vhost: "{{ uranus_domains.dev_backend }}"
            http_uri: "{{ api_health_endpoint }}"
